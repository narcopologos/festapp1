<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festspel Neon</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            /* NYTT TEMA: NEON TOKYO (Matchar loggan) */
            --bg-dark: #0f0c29;
            --bg-medium: #302b63;
            --bg-light: #24243e;
            
            --accent-pink: #ff6bcb;  /* Matchar texten i loggan */
            --accent-cyan: #48dbfb;  /* Matchar glasen i loggan */
            
            --truth: #48dbfb;        /* Cyan */
            --dare: #ff6bcb;         /* Rosa */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Mörk lila/blå nattklubbs-gradient */
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-medium));
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- SKÄRMAR --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .active { display: flex; }

        /* --- LOGOTYP --- */
        .main-logo {
            max-width: 85%;         /* Lagom storlek på mobilen */
            height: auto;
            margin-bottom: 40px;    /* Luft under loggan */
            
            /* Ett mjukt rosa/lila sken bakom loggan för att få den att "lysa" */
            filter: drop-shadow(0 0 20px rgba(255, 107, 203, 0.4));
            
            /* Subtil "svävande" animation */
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        /* --- KNAPPAR --- */
        .btn {
            width: 80%;
            max-width: 300px;
            padding: 20px;
            margin: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            
            /* Genomskinlig mörk knapp */
            background: rgba(0, 0, 0, 0.5);
            /* Dubbel border (rosa och cyan) för neon-känsla */
            border: double 4px transparent;
            border-radius: 50px;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              linear-gradient(to right, var(--accent-pink), var(--accent-cyan));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            
            box-shadow: 0 0 15px rgba(255, 107, 203, 0.2);
            
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }
        
        .btn:active { 
            transform: scale(0.95); 
            background: rgba(255, 107, 203, 0.3); /* Rosa ton vid tryck */
        }
        
        .btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            filter: grayscale(1);
        }

        /* --- FLASKAN --- */
        #bottle-container {
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: none; 
            border-radius: 50%;
            /* Glödande ring i cyan/rosa */
            background: radial-gradient(circle, rgba(72, 219, 251, 0.2) 0%, rgba(0,0,0,0) 70%);
            border: 2px solid rgba(255, 107, 203, 0.3);
        }

        #bottle-img {
            width: auto;
            height: 250px;
            /* Cyan-färgat sken runt flaskan */
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            transform-origin: center center;
            cursor: grab;
            -webkit-user-drag: none;
            user-drag: none;
        }

        #bottle-img:active { cursor: grabbing; }

        .spin-instruction {
            margin-top: 30px;
            font-style: italic;
            color: var(--accent-cyan);
            font-weight: bold;
            opacity: 0.8;
            min-height: 1.2em;
            animation: pulse 1.5s infinite;
            transition: opacity 0.3s;
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* --- VÄNDBART KORT --- */
        .card-scene {
            width: 300px;
            height: 450px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .card-object {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .card-object.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; 
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            background: var(--bg-light);
            color: #fff;
            border: 2px solid var(--accent-pink);
        }

        /* BAKSIDAN: Neon-mönster */
        .face-back {
            background: 
                radial-gradient(circle at top right, rgba(72, 219, 251, 0.4), transparent),
                radial-gradient(circle at bottom left, rgba(255, 107, 203, 0.4), transparent),
                var(--bg-dark);
            color: var(--accent-pink);
            font-size: 6rem;
            text-shadow: 0 0 20px var(--accent-pink), 0 0 40px var(--accent-cyan);
        }

        .face-front {
            transform: rotateY(180deg);
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.5;
            background: linear-gradient(135deg, var(--bg-medium), var(--bg-dark));
        }

        .category-label {
            position: absolute;
            top: 25px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: bold;
            color: var(--accent-cyan);
        }

        /* --- VAL AV S/K --- */
        .choice-container {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .choice-card {
            width: 48%;
            height: 220px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Neon-färger för valen */
        .choice-card.truth { 
            background: linear-gradient(135deg, var(--accent-cyan), #0072ff); 
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .choice-card.dare { 
            background: linear-gradient(135deg, var(--accent-pink), #ff416c); 
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .choice-card:active { transform: scale(0.95); filter: brightness(1.2); }

        /* --- UI ELEMENTS --- */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 100;
        }

        .icon-btn {
            background: rgba(0,0,0,0.5);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        #rules-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.95);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--bg-medium);
            color: #eee;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            text-align: left;
            position: relative;
            border: 2px solid var(--accent-pink);
            box-shadow: 0 0 30px rgba(255, 107, 203, 0.3);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--accent-pink);
        }
        
        #rules-title {
            color: var(--accent-cyan);
            border-bottom: 1px solid var(--accent-pink);
            padding-bottom: 10px;
        }

        .btn-bottom {
            margin-top: auto;
            background: linear-gradient(to right, var(--accent-pink), var(--accent-cyan));
            color: white;
            font-weight: bold;
            border: none;
            width: 100%;
        }
        
        #loading-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-style: italic;
        }

    </style>
</head>
<body>

    <div id="rules-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleRules()">✖</span>
            <h2 id="rules-title">Regler</h2>
            <p id="rules-text">Här står reglerna...</p>
        </div>
    </div>

    <div id="menu-screen" class="screen active">
        <img src="logo.png" alt="Festapp1 Logo" class="main-logo">
        
        <button class="btn game-btn" onclick="preStartGame('sk')" disabled>Snurra Flaskan / Sannning & Konka</button>
        <button class="btn game-btn" onclick="preStartGame('jha')" disabled>Jag har aldrig</button>
        <button class="btn game-btn" onclick="preStartGame('pek')" disabled>Pekleken</button>
        <p id="loading-msg">Laddar frågor...</p>
    </div>

    <div id="bottle-choice-screen" class="screen">
        <div class="top-bar"><button class="icon-btn" onclick="goHome()">← Meny</button></div>
        <h2>Hur vill ni spela?</h2>
        <button class="btn" onclick="setBottleMode(true)">Digital Flaska (Snurra här)</button>
        <button class="btn" onclick="setBottleMode(false)">Egen Flaska (Vi har en)</button>
    </div>

    <div id="bottle-spin-screen" class="screen">
        <div class="top-bar">
            <button class="icon-btn" onclick="goHome()">Avsluta</button>
            <button class="icon-btn" onclick="toggleRules()">Regler ?</button>
        </div>
        
        <div id="bottle-container" onclick="handleContainerClick()">
            <img src="flaska.png" id="bottle-img" alt="Flaska" draggable="false">
        </div>
        <p class="spin-instruction" id="spin-text">Dra snärtigt över flaskan!</p>
    </div>

    <div id="choice-screen" class="screen">
        <div class="top-bar">
            <button class="icon-btn" onclick="goHome()">Avsluta</button>
            <button class="icon-btn" onclick="toggleRules()">Regler ?</button>
        </div>
        <h2>Välj ett kort</h2>
        <div class="choice-container">
            <div class="choice-card truth" onclick="showResult('sanning')">Sanning</div>
            <div class="choice-card dare" onclick="showResult('konka')">Konsekvens</div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="top-bar">
            <button class="icon-btn" onclick="goHome()">Avsluta</button>
            <button class="icon-btn" onclick="toggleRules()">Regler ?</button>
        </div>

        <div class="card-scene" onclick="flipCard()">
            <div class="card-object" id="the-card">
                <div class="card-face face-back">?</div>
                <div class="card-face face-front" id="card-front-face">
                    <span class="category-label" id="res-category">Kategori</span>
                    <p id="res-text">Laddar...</p>
                </div>
            </div>
        </div>

        <button class="btn btn-bottom" onclick="nextRound()">Nästa runda</button>
    </div>

    <script>
        // --- DATA HANTERING ---
        let content = {}; // Tom från början
        
        // Denna funktion körs direkt när sidan öppnas
        async function loadContent() {
            try {
                // Hämta JSON-filen
                const response = await fetch('questions.json');
                
                if (!response.ok) throw new Error("Kunde inte hitta filen");
                
                content = await response.json();
                
                // Aktivera knapparna
                document.querySelectorAll('.game-btn').forEach(btn => {
                    btn.disabled = false;
                });
                document.getElementById('loading-msg').style.display = 'none';
                console.log("Innehåll laddat!");
                
            } catch (error) {
                document.getElementById('loading-msg').innerText = "Fel: Kunde inte ladda frågorna. (Är questions.json uppladdad?)";
                document.getElementById('loading-msg').style.color = "#ff6b6b";
                console.error(error);
            }
        }

        // Starta laddning
        loadContent();


        // --- LOGIK ---
        let currentGame = '';
        let useDigitalBottle = false;
        let currentRotation = 0;
        let isCardFlipped = false;
        let isWaitingForClick = false; 
        let autoNextTimer = null; 
        let cardDecks = {}; 

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goHome() {
            showScreen('menu-screen');
            currentGame = '';
            clearTimeout(autoNextTimer); 
        }

        function preStartGame(gameId) {
            if (!content[gameId]) {
                alert("Spelet laddades inte korrekt.");
                return;
            }
            currentGame = gameId;
            if (gameId === 'sk') {
                showScreen('bottle-choice-screen');
            } else {
                showResult('all'); 
            }
        }

        function setBottleMode(isDigital) {
            useDigitalBottle = isDigital;
            if (useDigitalBottle) {
                showScreen('bottle-spin-screen');
                resetBottleState(); 
                setupBottlePhysics();
            } else {
                showScreen('choice-screen');
            }
        }

        function nextRound() {
            document.getElementById('the-card').classList.remove('is-flipped');
            isCardFlipped = false;

            setTimeout(() => {
                if (currentGame === 'sk') {
                    if (useDigitalBottle) {
                        showScreen('bottle-spin-screen');
                        resetBottleState();
                    } else {
                        showScreen('choice-screen');
                    }
                } else {
                    showResult('all'); 
                }
            }, 300);
        }

        function showResult(type) {
            // Kontroll så data finns i content
            if (!content[currentGame] || !content[currentGame][type]) {
                console.error("Saknas data för:", currentGame, type);
                return;
            }

            // --- NY LOGIK FÖR KORTLEK (Inga dubbletter) ---
            
            // 1. Skapa struktur för spelet om den saknas
            if (!cardDecks[currentGame]) {
                cardDecks[currentGame] = {};
            }

            // 2. Om leken är tom (eller inte finns än) -> Fyll på med alla kort från originalet
            if (!cardDecks[currentGame][type] || cardDecks[currentGame][type].length === 0) {
                // Kopiera original-listan till vår spel-lek
                console.log("Blandar om kortleken...");
                cardDecks[currentGame][type] = [...content[currentGame][type]];
            }

            // 3. Välj ett slumpmässigt index från den KVARVARANDE leken
            const currentDeck = cardDecks[currentGame][type];
            const randomIndex = Math.floor(Math.random() * currentDeck.length);

            // 4. "Dra" kortet (Hämta texten OCH ta bort den från leken så den inte kommer igen)
            // splice returnerar en lista, vi tar första elementet [0]
            let rawText = currentDeck.splice(randomIndex, 1)[0]; 

            // ------------------------------------------------
            
            // --- VARIABEL-HANTERING ({riktning}) ---
            if (rawText.includes("{riktning}")) {
                const directions = ["höger", "vänster"];
                const randomDir = directions[Math.floor(Math.random() * directions.length)];
                rawText = rawText.replace("{riktning}", randomDir);
            }
            // -------------------------------------------
            
            // Visa texten
            document.getElementById('res-category').innerText = type === 'all' ? content[currentGame].title : type.toUpperCase();
            document.getElementById('res-text').innerHTML = rawText; 
            
            // Färga kortet
            const frontFace = document.getElementById('card-front-face');
            if (type === 'sanning') frontFace.style.borderTop = "10px solid #48dbfb";
            else if (type === 'konka') frontFace.style.borderTop = "10px solid #ff6b6b";
            else frontFace.style.borderTop = "none";

            // Återställ vändning
            document.getElementById('the-card').classList.remove('is-flipped');
            isCardFlipped = false;

            showScreen('result-screen');
        }

        function flipCard() {
            const card = document.getElementById('the-card');
            if (isCardFlipped) {
                card.classList.remove('is-flipped');
                isCardFlipped = false;
            } else {
                card.classList.add('is-flipped');
                isCardFlipped = true;
            }
        }

        function toggleRules() {
            const modal = document.getElementById('rules-modal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                const gameData = content[currentGame];
                document.getElementById('rules-title').innerText = gameData.title;
                document.getElementById('rules-text').innerHTML = gameData.rules;
                modal.style.display = 'flex';
            }
        }

        // --- FLASK LOGIK ---

        function resetBottleState() {
            isWaitingForClick = false;
            clearTimeout(autoNextTimer);
            document.getElementById('spin-text').innerText = "Dra snärtigt över flaskan!";
        }

        function handleContainerClick() {
            if (isWaitingForClick) {
                forceGoToChoice();
            }
        }

        function forceGoToChoice() {
            clearTimeout(autoNextTimer); 
            isWaitingForClick = false;
            showScreen('choice-screen');
        }

        function setupBottlePhysics() {
            const container = document.getElementById('bottle-container');
            let startY = 0;
            let startTime = 0;
            let isSpinning = false;

            const handleStart = (y) => {
                if (isSpinning || isWaitingForClick) return;
                startY = y;
                startTime = new Date().getTime();
            };

            const handleEnd = (y) => {
                if (isSpinning || isWaitingForClick) return;
                const endTime = new Date().getTime();
                const distance = startY - y; 
                const time = endTime - startTime;

                if (Math.abs(distance) > 30) { 
                    isSpinning = true; 
                    spinBottle(distance, time, () => {
                        isSpinning = false;
                    });
                }
            };

            container.ontouchstart = (e) => handleStart(e.touches[0].clientY);
            container.ontouchend = (e) => handleEnd(e.changedTouches[0].clientY);

            container.onmousedown = (e) => {
                e.preventDefault(); 
                handleStart(e.clientY);
            };
            
            window.onmouseup = (e) => {
                if (startTime > 0) {
                    handleEnd(e.clientY);
                    startTime = 0; 
                }
            };
        }

        function spinBottle(distance, time, callback) {
            const bottle = document.getElementById('bottle-img');
            
            let velocity = 1.5; 
            if (time < 200) velocity = 3.0; 
            if (time > 500) velocity = 1.0; 

            const direction = distance > 0 ? 1 : -1;
            const baseRot = 1080; 
            const randomRot = Math.random() * 360; 
            const totalRot = (baseRot + randomRot) * direction;

            currentRotation += totalRot; 

            bottle.style.transition = `transform 3.5s cubic-bezier(0.2, 0.8, 0.2, 1)`;
            bottle.style.transform = `rotate(${currentRotation}deg)`;

            document.getElementById('spin-text').innerText = "Snurrar...";

            setTimeout(() => {
                document.getElementById('spin-text').innerText = "Klar! Tryck för att gå vidare...";
                isWaitingForClick = true; 
                if (callback) callback();

                autoNextTimer = setTimeout(() => {
                    if (isWaitingForClick) {
                        forceGoToChoice();
                    }
                }, 7000);

            }, 3500);
        }
    </script>
</body>
</html>
